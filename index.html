<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexum - Construction Workflow</title>
    <script>
      // Global Fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This must run before any other script to protect the fetch property.
      if (typeof window !== 'undefined' && 'fetch' in window) {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { console.debug('Suppressed attempt to overwrite window.fetch'); },
            configurable: true,
            enumerable: true
          });
        } catch (e) {}
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
